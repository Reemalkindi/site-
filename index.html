<!DOCTYPE html>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#1a1c1e",
          "on-primary": "#ffffff",
          "secondary": "#a63b00",
          "accent": "#F26522",
          "accent-bright": "#fc6c29",
          "surface": "#fcf8f8",
          "on-surface": "#1c1b1b",
          "on-surface-variant": "#44474a",
          "slate-surface": "#F8F9FA",
          "industrial-gray": "#E9ECEF",
          "technical-silver": "#CED4DA",
          "deep-obsidian": "#121212",
          "outline": "#75777a",
          "outline-variant": "#c5c6ca"
        },
        borderRadius: { "DEFAULT": "0px", "full": "9999px" },
        spacing: { "margin-mobile": "20px", "margin-desktop": "64px", "gutter": "24px", "unit": "4px" },
        fontFamily: {
          "display-lg": ["Geist", "Inter", "system-ui", "sans-serif"],

        fontSize: {
          "headline-lg-mobile": ["24px", { lineHeight: "1.2", fontWeight: "600" }],
          "headline-lg": ["32px", { lineHeight: "1.2", fontWeight: "600" }],

          "label-caps": ["12px", { lineHeight: "1.0", letterSpacing: "0.12em", fontWeight: "500" }]
        }
      }
    }
  }
</script>
